# SPDX-License-Identifier: MPL-2.0
#
# Security scanning for contain-security/vault-mcp-server (fork).
#
# govulncheck and the Trivy dependency/secret scan are intended as required
# gates on main. The Trivy misconfiguration scan runs for visibility only
# (non-blocking) until the Dockerfile hardening is done and tested separately.

name: Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "27 6 * * 1" # weekly (Mon) — catches newly disclosed vulns with no code change
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: "go.mod"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Trivy - dependencies and secrets (gating)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Trivy - misconfiguration (informational)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig
          severity: HIGH,CRITICAL
          exit-code: "0"
